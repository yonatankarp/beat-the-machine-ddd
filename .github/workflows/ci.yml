name: Continuous Integration

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    permissions:
      contents: read
      packages: read
      pull-requests: write
      checks: write
    uses: yonatankarp/github-actions/.github/workflows/ci.yml@v2
    with:
      image-name: beat-the-machine
      dockerfile-path: beat-the-machine-adapters/Dockerfile
      # Root build so every JVM module's tests run (a scoped :adapters build
      # skips the domain and application test suites).

  frontend-coverage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/frontend-coverage

  dependabot_auto_merge:
    needs: pipeline
    if: ${{ github.actor == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    uses: yonatankarp/github-actions/.github/workflows/dependabot-auto-merge.yml@v2
    secrets:
      GITHUB_PAT: ${{ secrets.REVIEWER_GITHUB_TOKEN }}

  linters:
    permissions:
      contents: read
      pull-requests: read
    uses: yonatankarp/github-actions/.github/workflows/linters.yml@v2
