server:
  port: ${PORT:80}

spring:
  datasource:
    url: jdbc:sqlite:${BTM_DB_PATH:beat-the-machine.db}
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

btm:
  persistence: sqlite

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never
